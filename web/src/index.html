<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="loginstyle.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <div class="login-container">
        <form id="loginForm" class="login-box">
            <h1 class="title">Login</h1>
            <div id="errorAlert" class="alert alert-danger align-items-center py-2 px-3 mt-2 mb-0" role="alert"
                style="display: none;">
                <i class="fa-solid fa-triangle-exclamation me-2"></i>
                <div id="errorMessage">
                    An example danger alert with an icon
                </div>
            </div>
            <div class="input-group input-group-lg email-input">
                <span class="input-group-text" id="visible-addon">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="text" id="username" class="form-control" placeholder="Username" aria-label="Username"
                    aria-describedby="visible-addon" required>
            </div>
            <div class="input-group input-group-lg password-input">
                <span class="input-group-text" id="password-icon">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" id="password" class="form-control" placeholder="Password" aria-label="Password"
                    aria-describedby="password-icon" required>
            </div>
            <button type="submit" id="loginBtn" class="btn login-button">Login</button>
        </form>
    </div>
</body>

<script>
    document.getElementById('username').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            event.preventDefault();
            document.getElementById('password').focus();
        }
    })

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault(); // 폼 제출 시 브라우저가 새로고침되는 기본 동작을 막음

        // 에러 알림창 초기화
        const errorAlert = document.getElementById('errorAlert');
        errorAlert.style.display = "none";

        const usernameVal = document.getElementById('username').value;
        const passwordVal = document.getElementById('password').value;

        if (!usernameVal || !passwordVal) {
            document.getElementById('errorMessage').textContent = "아이디와 비밀번호를 모두 입력해주세요.";
            errorAlert.style.display = "flex";
            return;
        }

        try {
            const response = await fetch('http://localhost:6974/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "username": usernameVal,
                    "password": passwordVal
                })
            });

            const result = await response.json();

            if (response.ok && result.success) {
                // 로그인 성공 시 sessionStorage에 토큰 저장
                sessionStorage.setItem('token', 'dummy-token-' + result.user_id);
                sessionStorage.setItem('username', usernameVal);
                window.location.href = "/main";
            } else {
                document.getElementById('errorMessage').textContent = result.detail || "Login failed";
                errorAlert.style.display = "flex";
            }

        } catch (e) {
            console.error("Error:", e);
            alert("error occurred.");
        }
    });
</script>

</html>
