<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="loginstyle.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <div class="login-container">
        <form id="loginForm" class="login-box needs-validation" novalidate>
            <h1 class="title">Login</h1>
            <div class="input-group input-group-lg email-input">
                <span class="input-group-text" id="visible-addon">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="text" id="username" class="form-control" placeholder="Username" aria-label="Username"
                    aria-describedby="visible-addon" required>
                <div class="invalid-feedback">
                    아이디를 입력해주세요.
                </div>
            </div>
            <div class="input-group input-group-lg password-input">
                <span class="input-group-text" id="password-icon">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" id="password" class="form-control" placeholder="Password" aria-label="Password"
                    aria-describedby="password-icon" required>
                <div class="invalid-feedback">
                    비밀번호를 입력해주세요.
                </div>
            </div>
            <button type="submit" id="loginBtn" class="btn login-button">Login</button>
        </form>
    </div>
</body>

<script>
    document.getElementById('username').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            event.preventDefault();
            document.getElementById('password').focus();
        }
    })

    // 입력창 값 변경 시 에러 경고 상태(!) 초기화
    document.getElementById('username').addEventListener('input', (e) => {
        e.target.setCustomValidity("");
        e.target.nextElementSibling.textContent = "아이디를 입력해주세요.";
    });

    document.getElementById('password').addEventListener('input', (e) => {
        e.target.setCustomValidity("");
        e.target.nextElementSibling.textContent = "비밀번호를 입력해주세요.";
    });

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault(); // 폼 제출 시 브라우저가 새로고침되는 기본 동작을 막음

        const form = event.currentTarget;
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // 새로운 제출 시 기존 커스텀 에러 상태(!) 초기화
        usernameInput.setCustomValidity("");
        passwordInput.setCustomValidity("");
        usernameInput.nextElementSibling.textContent = "아이디를 입력해주세요.";
        passwordInput.nextElementSibling.textContent = "비밀번호를 입력해주세요.";

        // Bootstrap 검증 클래스 추가 (색상 강조)
        form.classList.add('was-validated');

        // 입력 폼 유효성 검사 실패 시 중단
        if (!form.checkValidity()) {
            event.stopPropagation();
            return;
        }

        const usernameVal = document.getElementById('username').value;
        const passwordVal = document.getElementById('password').value;

        try {
            const response = await fetch('http://localhost:6974/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "username": usernameVal,
                    "password": passwordVal
                })
            });

            const result = await response.json();

            if (response.ok && result.success) {
                // 로그인 성공 시 sessionStorage에 토큰 저장
                sessionStorage.setItem('token', 'dummy-token-' + result.user_id);
                sessionStorage.setItem('username', usernameVal);
                window.location.href = "/main";
            } else {
                // 로그인 실패 시 input창을 경고 상태(!)로 변환
                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');

                usernameInput.setCustomValidity("Invalid");
                passwordInput.setCustomValidity("Invalid");
                usernameInput.nextElementSibling.textContent = "아이디를 확인해주세요.";
                passwordInput.nextElementSibling.textContent = "비밀번호를 확인해주세요.";
            }

        } catch (e) {
            console.error("Error:", e);
            alert("error occurred.");
        }
    });
</script>

</html>
