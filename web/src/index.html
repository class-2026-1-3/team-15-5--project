<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="loginstyle.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <div class="login-container">
        <form id="loginForm" class="login-box needs-validation" novalidate>
            <h1 class="title">Login</h1>
            <div class="input-group input-group-lg email-input">
                <span class="input-group-text" id="visible-addon">
                    <i class="fa-solid fa-user"></i>
                </span>
                <input type="text" id="username" class="form-control" placeholder="Username" aria-label="Username"
                    aria-describedby="visible-addon" required>
                <div class="invalid-feedback">
                    아이디를 입력해주세요.
                </div>
            </div>
            <div class="input-group input-group-lg password-input">
                <span class="input-group-text" id="password-icon">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" id="password" class="form-control" placeholder="Password" aria-label="Password"
                    aria-describedby="password-icon" required>
                <div class="invalid-feedback">
                    비밀번호를 입력해주세요.
                </div>
            </div>
            <button type="submit" id="loginBtn" class="btn login-button">Login</button>
        </form>
    </div>
</body>

<script src="index.js"></script>

</html>
